<path d="M37 24 L68 24 Q71 24 71 27 L71 77 L52 66 L33 77 L33 27 Q33 24 37 24 Z" fill="#A0AEC0" style="fill:rgb(160, 174, 192);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<path d="M48 31 L79 31 Q82 31 82 34 L82 84 L63 73 L44 84 L44 34 Q48 31 48 31 Z" fill="#F7FAFC" style="fill:rgb(247, 250, 252);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
</g>

<!-- Wordmark "Recall" -->
<text x="80" y="225" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="#1A202C" letter-spacing="-1.5" style="fill:rgb(26, 32, 44);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Inter, system-ui, -apple-system, sans-serif;font-size:64px;font-weight:700;text-anchor:start;dominant-baseline:auto">Recall</text>

<!-- Tagline -->
<text x="82" y="262" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#4A5568" letter-spacing="3" style="fill:rgb(74, 85, 104);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Inter, system-ui, -apple-system, sans-serif;font-size:14px;font-weight:500;text-anchor:start;dominant-baseline:auto">BOOKMARK CATALOG</text>

<!-- Decorative thin line -->
<line x1="80" y1="280" x2="320" y2="280" stroke="#CBD5E0" stroke-width="1" style="fill:rgb(0, 0, 0);stroke:rgb(203, 213, 224);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

