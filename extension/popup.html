<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recall</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; width: 360px; background: #fcf8ff; color: #1b1b23; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; vertical-align: middle; }

    /* Header */
    .header { padding: 14px 20px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid rgba(199,196,215,0.2); }
    .header h1 { font-size: 16px; font-weight: 800; letter-spacing: -0.02em; }
    .header .material-symbols-outlined { color: #4343d5; font-variation-settings: 'FILL' 1; }

    /* Current tab */
    .current-tab { padding: 14px 20px; background: #e9e6f3; }
    .current-tab .label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #767586; margin-bottom: 4px; }
    .current-tab .title { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .current-tab .url { font-size: 10px; color: #464555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }

    /* Form */
    .form { padding: 14px 20px; }
    .form label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #767586; display: block; margin-bottom: 6px; }
    .form select { width: 100%; padding: 10px 12px; border: none; background: #e9e6f3; border-radius: 8px; font-family: inherit; font-size: 13px; color: #1b1b23; appearance: none; }
    .form select:focus { outline: 2px solid #4343d5; }

    /* Buttons */
    .btn-primary { width: 100%; padding: 12px; background: linear-gradient(135deg, #4343d5, #5d5fef); color: white; border: none; border-radius: 10px; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; margin-top: 12px; transition: transform 0.1s; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: default; }

    /* Collections */
    .collections { padding: 0 20px 16px; }
    .section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #767586; margin-bottom: 8px; }
    .col-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: #f5f2fe; border-radius: 8px; margin-bottom: 6px; }
    .col-item:hover { background: #e9e6f3; }
    .col-item .name { font-size: 12px; font-weight: 600; }
    .col-item .open-btn { font-size: 10px; font-weight: 700; color: #4343d5; text-transform: uppercase; letter-spacing: 0.05em; background: none; border: none; cursor: pointer; font-family: inherit; padding: 4px 8px; border-radius: 4px; }
    .col-item .open-btn:hover { background: rgba(67,67,213,0.1); }

    /* Status */
    .status { padding: 8px 20px; font-size: 12px; font-weight: 600; text-align: center; }
    .status.success { color: #4343d5; }
    .status.error { color: #ba1a1a; }

    /* Sign in / Token setup */
    .setup { padding: 32px 20px; text-align: center; }
    .setup p { font-size: 12px; color: #464555; margin-bottom: 12px; line-height: 1.5; }
    .setup .token-input { width: 100%; padding: 10px 12px; border: 2px solid #e4e1ed; border-radius: 8px; font-family: inherit; font-size: 12px; text-align: center; margin-bottom: 12px; }
    .setup .token-input:focus { outline: none; border-color: #4343d5; }
    .setup a { color: #4343d5; font-weight: 700; text-decoration: none; font-size: 12px; }
    .setup .icon { font-size: 40px; color: #4343d5; margin-bottom: 12px; font-variation-settings: 'FILL' 1; }

    /* Disconnect */
    .disconnect { padding: 0 20px 16px; text-align: center; }
    .disconnect button { font-size: 10px; color: #767586; background: none; border: none; cursor: pointer; font-family: inherit; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <span class="material-symbols-outlined">bookmarks</span>
    <h1>Recall</h1>
    <button id="settings-toggle" style="margin-left:auto;background:none;border:none;cursor:pointer;color:#767586;">
      <span class="material-symbols-outlined" style="font-size:20px;">settings</span>
    </button>
  </div>
  <div id="app"></div>
  <script src="popup.js"></script>
</body>
</html>
